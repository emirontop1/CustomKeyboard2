name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Create PNG icons
        run: |
          python3 << 'PYEOF'
          import struct, zlib, os
          def make_png(size, color=(79, 142, 247)):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              raw = b''
              for y in range(size):
                  raw += b'\x00'
                  for x in range(size):
                      raw += bytes(color)
              png = b'\x89PNG\r\n\x1a\n'
              png += chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
              png += chunk(b'IDAT', zlib.compress(raw))
              png += chunk(b'IEND', b'')
              return png
          
          for density, size in [("mdpi", 48), ("hdpi", 72), ("xhdpi", 96), ("xxhdpi", 144), ("xxxhdpi", 192)]:
              folder = f"app/src/main/res/mipmap-{density}"
              os.makedirs(folder, exist_ok=True)
              for name in ["ic_launcher.png", "ic_launcher_round.png"]:
                  path = f"{folder}/{name}"
                  with open(path, "wb") as f:
                      f.write(make_png(size))
                  print(f"Created: {path}")
          PYEOF

      - name: Build Debug APK
        run: gradle :app:assembleDebug

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: v1.0.0
          name: "Custom Keyboard Pro v1.0.0"
          body: |
            # Custom Keyboard Pro
            
            Advanced Android keyboard with:
            - ✅ Auto-convert (text shortcuts)
            - ✅ Banned words filter
            - ✅ Full customization
            - ✅ Dark/light theme
            - ✅ Custom accent colors
            
            ## Features
            - Text shortcuts: "tşk" → "Teşekkürler!"
            - Offensive word filtering
            - Fully customizable theme
            - Haptic & sound feedback
            - Multi-language support
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
